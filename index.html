  <div id="prompt">Level Up</div>

  <script>
    var stage=document.getElementById('stage');
    var audio=document.getElementById('audio');
    var started=false;

    function goFullscreen(){
      var el=document.documentElement;
      var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.msRequestFullscreen;
      if(fn){ try{ fn.call(el); }catch(e){} }
    }

    function begin(){
      if(started) return; started=true;
      goFullscreen();                  // fires inside the click gesture
      stage.classList.add('playing');  // logo fades up, prompt fades out
      try{ audio.currentTime=0; }catch(e){}
      var p=audio.play();              // plays once through, then holds on the logo
      if(p && p.catch){ p.catch(function(){}); }
    }

    stage.addEventListener('click', begin);
    document.addEventListener('keydown', begin);
    document.addEventListener('touchstart', begin, {passive:true});
  </script>
